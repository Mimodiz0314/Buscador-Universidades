name: Auto Sincronizador de Admisiones (IA)

on:
  schedule:
    # Se ejecuta a las 00:00 UTC los días 1 y 15 de cada mes
    - cron: '0 0 1,15 * *'
  workflow_dispatch:
    # Permite ejecutar manualmente desde la pestaña Actions en GitHub

jobs:
  update-statuses:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar Dependencias
        run: |
          npm ci || npm install --no-audit --no-fund

      - name: Ejecutar Script de Actualización con IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/update_admission_statuses.js

      - name: Subir Cambios a la Base de Datos
        run: |
          git config --global user.name "UniScoop Bot"
          git config --global user.email "bot@uniscoop.edu.co"
          git add src/data/estados.json
          # Solo hacer commit si hay cambios en el archivo
          if ! git diff --cached --quiet; then
            git commit -m "chore: actualizacion automatica de estados de admision via IA [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Cambios subidos e integrados."
          else
            echo "无 No se detectaron cambios en los estados de admisiones."
          fi
